# 文件名: .github/workflows/clawcloud-login.yml
name: ClawCloud Run Auto Login (2FA Support)

on:
  schedule:
    - cron: '0 0 */15 * *'
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest
    
    # 【关键修改】强制所有 JavaScript Actions 使用 Node.js 24 运行
    # 这将彻底消除 "Node.js 20 actions are deprecated" 警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp
          playwright install chromium
          # 必须安装系统依赖，否则浏览器无法启动
          playwright install-deps chromium

      - name: Run Login Script
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRET }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0 
        run: python -u login_script.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-result-${{ github.run_id }}
          path: login_result.png
          retention-days: 3
