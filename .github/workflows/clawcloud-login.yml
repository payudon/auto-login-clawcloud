# 文件名: .github/workflows/clawcloud-login.yml
name: ClawCloud Run Auto Login (2FA Support)

# 【关键修改 1】将环境变量放在全局顶层，确保在所有 Job 启动前生效
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 */15 * *'
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest
    
    # 这里也可以保留一份作为双重保险
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 尝试使用具体的最新 SHA 或确保 v4 是最新的，这里保持 v4
      - name: Checkout repository
        uses: actions/checkout@v4
        # 如果 v4 依然报错，可以尝试临时切换到 main 分支测试：
        # uses: actions/checkout@main 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp
          playwright install chromium
          playwright install-deps chromium

      - name: Run Login Script
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRET }}
        run: python -u login_script.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-result-${{ github.run_id }}
          path: login_result.png
          retention-days: 3
