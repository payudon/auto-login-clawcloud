# 文件名: .github/workflows/clawcloud-login.yml
name: ClawCloud Run Auto Login (2FA Support)

on:
  schedule:
    - cron: '0 0 */15 * *'
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest
    
    # 强制使用 Node.js 24 消除警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 【修改点】移除 cache 配置，防止它自动寻找 requirements.txt
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 删除了 cache: 'pip'，因为项目根目录没有 requirements.txt
          # 如果需要缓存，可以在下面 Install Dependencies 步骤手动配置 cache 动作，但此处直接安装更简单

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp
          playwright install chromium
          # 必须安装系统级依赖，否则浏览器启动会报错
          playwright install-deps chromium

      - name: Run Login Script
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRET }}
        run: python -u login_script.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-result-${{ github.run_id }}
          path: login_result.png
          retention-days: 3
